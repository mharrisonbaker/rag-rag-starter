services:
  - type: web
    name: plain-language-backend
    env: python
    plan: free
    region: oregon # Or your preferred region
    buildCommand: |
      python -m venv .venv
      . .venv/bin/activate
      pip install -r requirements.txt
    startCommand: |
      . .venv/bin/activate
      uvicorn services.api.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: PYTHONPATH
        value: /opt/render/project/src/src
  - type: web
    name: plain-language-frontend
    env: node
    plan: free
    region: oregon # Or your preferred region
    buildCommand: "npm install && npm run build --prefix apps/plain-check-web"
    startCommand: "npm run preview --prefix apps/plain-check-web -- --host 0.0.0.0 --port 10001"
