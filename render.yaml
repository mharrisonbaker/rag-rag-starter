services:
  - type: web
    name: plain-language-backend
    env: python
    plan: free
    region: oregon # Or your preferred region
    buildCommand: "pip install -r services/api/requirements.txt"
    startCommand: "uvicorn services.api.main:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: OPENAI_API_KEY
        sync: false
